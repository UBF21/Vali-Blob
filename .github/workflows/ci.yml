name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Run unit tests with coverage
      run: |
        dotnet test tests/Vali-Blob.Core.Tests/ \
          --no-build \
          --configuration Release \
          --settings coverlet.runsettings \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --verbosity normal

    - name: Install reportgenerator tool
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coverage/report" \
          -reporttypes:"HtmlInline_AzurePipelines;Cobertura;TextSummary"

    - name: Print coverage summary
      run: cat coverage/report/Summary.txt

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/report/
        retention-days: 14

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: coverage/**/coverage.cobertura.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release

    - name: Pack NuGet packages
      run: dotnet pack --no-build --configuration Release --output nupkg

    - name: Publish to NuGet
      env:
        NUGET_KEY: ${{ secrets.NUGET_API_KEY }}
      run: dotnet nuget push 'nupkg/*.nupkg' --api-key "$NUGET_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
